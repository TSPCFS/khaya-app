<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khaya — Find Home</title>
    <meta name="theme-color" content="#1A1A2E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config={theme:{extend:{colors:{'deep-night':'#1A1A2E','dn-light':'#2A2A3E','flame':'#FF5722','flame-h':'#FF7043','teal':'#00BFA6','storm':'#6B7280','charcoal':'#374151','green':'#10B981','amber':'#F59E0B','red':'#EF4444'},fontFamily:{'inter':['Inter','sans-serif'],'grotesk':['Space Grotesk','sans-serif'],'mono':['JetBrains Mono','monospace']}}}}
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body,#root{height:100%;font-family:'Inter',sans-serif}
        body{background:#1A1A2E;color:#FFF;overflow:hidden;-webkit-font-smoothing:antialiased}
        .leaflet-container{background:#1A1A2E}
        .leaflet-popup-content-wrapper{background:#2A2A3E;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);border:1px solid #374151}
        .leaflet-popup-content{color:#FFF;margin:0;padding:0}
        .leaflet-popup-close-button{color:#FF5722!important;font-size:18px!important}
        .leaflet-popup-tip{background:#2A2A3E}
        .cpin{filter:drop-shadow(0 3px 6px rgba(0,0,0,.4))}
        .leaflet-control-zoom a{background:#2A2A3E!important;color:#FF5722!important;border-color:#374151!important}
        @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
        .shimmer{animation:shimmer 1.5s infinite;background:linear-gradient(90deg,#2A2A3E 0%,#3A3A4E 40%,#2A2A3E 100%);background-size:800px 100%}
        @keyframes pr{0%{transform:scale(.8);opacity:1}100%{transform:scale(2);opacity:0}}.pr{animation:pr 1.5s cubic-bezier(.215,.61,.355,1) infinite}
        @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .3s ease-out}
        @keyframes ss{from{transform:rotate(0)}to{transform:rotate(360deg)}}.ss{animation:ss 3s linear infinite}
        @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}.su{animation:su .35s ease-out}
        @keyframes glow{0%{box-shadow:0 0 20px rgba(255,87,34,0.5)}50%{box-shadow:0 0 40px rgba(255,87,34,0.8)}100%{box-shadow:0 0 20px rgba(255,87,34,0.5)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes typing{0%,60%{transform:translateY(0)}80%{transform:translateY(-10px)}100%{transform:translateY(0)}}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#FF5722;border-radius:2px}
        .dh{width:36px;height:4px;background:#6B7280;border-radius:2px;margin:10px auto}
        .ch{transition:transform .2s,box-shadow .2s}.ch:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}.ch:active{transform:scale(.98)}
        .lc3{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
        .snap-pulse{animation:glow 2s cubic-bezier(0.4,0,0.6,1) infinite}
        .tab-fade{animation:fadeIn 200ms ease-out}
        .toast-slide{animation:slideDown 300ms ease-out}
        .typing-dot{animation:typing 1.4s infinite;display:inline-block}
        .scroll-snap{scroll-snap-type:x mandatory}
        .scroll-snap>*{scroll-snap-align:start;scroll-snap-stop:always}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useMemo}=React;

// ═══════════════════════════════════════════════════════════════
// API HELPERS & AUTH
// ═══════════════════════════════════════════════════════════════
const API='/api';
const getToken=()=>localStorage.getItem('khaya_token');
const setToken=(t)=>localStorage.setItem('khaya_token',t);
const clearToken=()=>localStorage.removeItem('khaya_token');

const api={
  get:async(path)=>{
    const res=await fetch(API+path,{headers:{'Authorization':'Bearer '+(getToken()||'')}});
    if(res.status===401){clearToken();window.location.reload()}
    return res.json();
  },
  post:async(path,body)=>{
    const res=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(getToken()||'')},body:JSON.stringify(body)});
    return res.json();
  },
  put:async(path,body)=>{
    const res=await fetch(API+path,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(getToken()||'')},body:JSON.stringify(body)});
    return res.json();
  },
  del:async(path)=>{
    const res=await fetch(API+path,{method:'DELETE',headers:{'Authorization':'Bearer '+(getToken()||'')}});
    return res.json();
  }
};

const USER_LOC={lat:-34.4214,lng:19.2369};
const parseJSON=(s)=>{try{return typeof s==='string'?JSON.parse(s):s||[]}catch{return[]}};

// ═══════════════════ UTILITIES ═══════════════════
const pin=(c,s=32)=>{const svg='<svg width="'+s+'" height="'+(s*1.25)+'" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg"><path d="M16 0C8.27 0 2 6.27 2 14c0 10 14 26 14 26s14-16 14-26C30 6.27 23.73 0 16 0z" fill="'+c+'" stroke="#1A1A2E" stroke-width="1.5"/><circle cx="16" cy="14" r="5" fill="#1A1A2E"/></svg>';return L.divIcon({html:svg,iconSize:[s,s*1.25],iconAnchor:[s/2,s*1.25],popupAnchor:[0,-(s*1.25)],className:'cpin'})};
const fp=(n)=>'R'+n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');
const Stars=({r,c})=>(<div className="flex items-center gap-1">{[1,2,3,4,5].map(i=><span key={i} className={'text-xs '+(i<=Math.round(r)?'text-flame':'text-charcoal')}>★</span>)}<span className="text-xs text-storm ml-1">({c})</span></div>);
const haversine=(lat1,lon1,lat2,lon2)=>{const R=6371;const dLat=(lat2-lat1)*Math.PI/180;const dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));return(R*c).toFixed(1)};
const calcMonthlyPayment=(price,deposit,rate,months)=>{const p=price*(1-deposit/100);const r=rate/100/12;return Math.round(p*r*(Math.pow(1+r,months))/(Math.pow(1+r,months)-1))};

// ═══════════════════ TOAST SYSTEM ═══════════════════
const Toast=({msg})=>{
    const[t,setT]=useState([]);
    window.showToast=(msg,type='success')=>{const id=Date.now();setT(x=>[...x,{id,msg,type}]);setTimeout(()=>setT(x=>x.filter(y=>y.id!==id)),3000)};
    return(
        <div className="fixed top-0 left-0 right-0 z-[9999] pointer-events-none p-4 space-y-2">
            {t.map(n=><div key={n.id} className={'toast-slide max-w-xs mx-auto rounded-lg px-4 py-3 text-sm font-medium pointer-events-auto '+(n.type==='success'?'bg-green text-white':(n.type==='info'?'bg-teal text-white':'bg-amber text-deep-night'))}>{n.msg}</div>)}
        </div>);
};

// ═══════════════════ LOGIN SCREEN ═══════════════════
const LoginScreen=({onLogin})=>{
    const[mode,setMode]=useState('login');const[email,setEmail]=useState('');const[pwd,setPwd]=useState('');const[name,setName]=useState('');const[loading,setLoading]=useState(false);const[err,setErr]=useState('');
    const handleLogin=async()=>{setLoading(true);setErr('');const res=await api.post('/auth/login',{email,password:pwd});if(res.token){setToken(res.token);onLogin(res.user)}else{setErr(res.error||'Login failed')}setLoading(false)};
    const handleRegister=async()=>{setLoading(true);setErr('');const res=await api.post('/auth/register',{name,email,password:pwd});if(res.token){setToken(res.token);onLogin(res.user)}else{setErr(res.error||'Registration failed')}setLoading(false)};
    return(
        <div className="h-screen bg-deep-night flex items-center justify-center p-6">
            <div className="max-w-sm w-full">
                <div className="text-center mb-8">
                    <p className="text-4xl mb-2">🏠</p>
                    <h1 className="font-grotesk text-3xl font-bold mb-1">Khaya</h1>
                    <p className="text-sm text-storm">Find Home</p>
                </div>
                <div className="bg-dn-light rounded-xl p-6 space-y-4">
                    {err&&<p className="text-red text-sm bg-red/10 rounded px-3 py-2 border border-red/30">{err}</p>}
                    {mode==='register'&&<input type="text" placeholder="Full Name" value={name} onChange={e=>setName(e.target.value)} className="w-full bg-deep-night rounded-lg px-4 py-3 text-sm outline-none border border-charcoal focus:border-flame transition"/>}
                    <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-deep-night rounded-lg px-4 py-3 text-sm outline-none border border-charcoal focus:border-flame transition"/>
                    <input type="password" placeholder="Password" value={pwd} onChange={e=>setPwd(e.target.value)} className="w-full bg-deep-night rounded-lg px-4 py-3 text-sm outline-none border border-charcoal focus:border-flame transition"/>
                    <button onClick={mode==='login'?handleLogin:handleRegister} disabled={loading} className="w-full bg-flame text-white font-semibold py-3 rounded-xl hover:bg-flame-h transition disabled:opacity-50">{loading?'...':mode==='login'?'Sign In':'Create Account'}</button>
                </div>
                <p className="text-center text-sm text-storm mt-4">
                    {mode==='login'?'Don\'t have an account?':'Already have an account?'}
                    <button onClick={()=>{setMode(mode==='login'?'register':'login');setErr('')}} className="text-flame font-medium ml-1">{mode==='login'?'Register':'Sign In'}</button>
                </p>
            </div>
        </div>);
};

// ═══════════════════ ONBOARDING ═══════════════════
const Onboarding=({done})=>{
    const[s,setS]=useState(0);
    const screens=[
        {title:"Search your way",icon:"🗺️",desc:"Find homes on an interactive map with smart filters"},
        {title:"Snap any home",icon:"📷",desc:"See a house you love? Snap it and we'll find the listing"},
        {title:"Chat instantly",icon:"💬",desc:"Connect with verified agents via WhatsApp-style messaging"}
    ];
    return(
        <div className="h-screen flex flex-col bg-deep-night items-center justify-center p-6 max-w-md mx-auto">
            <div className="text-6xl mb-8">{screens[s].icon}</div>
            <h1 className="font-grotesk text-3xl font-bold mb-3 text-center">{screens[s].title}</h1>
            <p className="text-center text-storm mb-12 max-w-xs">{screens[s].desc}</p>
            <div className="flex gap-1.5 mb-12">{screens.map((_,i)=><div key={i} className={'h-1 rounded-full '+(i===s?'bg-flame w-8':'bg-charcoal w-2')}/>)}</div>
            <div className="flex gap-3 w-full">
                <button onClick={done} className="text-storm text-sm font-medium">Skip</button>
                <div className="flex-1"></div>
                {s<2?<button onClick={()=>setS(s+1)} className="flex-1 bg-flame text-white font-semibold py-3 rounded-xl">Next</button>:<button onClick={done} className="flex-1 bg-flame text-white font-semibold py-3 rounded-xl">Get Started</button>}
            </div>
        </div>);
};

// ═══════════════════ PROPERTY CARD ═══════════════════
const FALLBACK_IMG='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" fill="%232A2A3E"><rect width="400" height="300"/><text x="200" y="150" text-anchor="middle" fill="%236B7280" font-size="14" font-family="sans-serif">No image available</text></svg>');
const imgErr=(e)=>{e.target.onerror=null;e.target.src=FALLBACK_IMG};
const Card=({p,tap,grid,dist})=>{
    const img=parseJSON(p.images)[0]||FALLBACK_IMG;
    const specs=[p.bedrooms&&p.bedrooms+' bed',p.bathrooms&&p.bathrooms+' bath',p.floor_size&&p.floor_size+'m²'].filter(Boolean);
    const specsErf=[...specs,p.erf_size>0&&p.erf_size+'m² erf'].filter(Boolean);
    if(grid)return(
        <div onClick={()=>tap(p)} className="bg-dn-light rounded-xl overflow-hidden cursor-pointer ch fi">
            <div className="relative"><img src={img} alt={p.title} className="w-full h-28 object-cover" loading="lazy" onError={imgErr}/>{p.featured&&<span className="absolute top-2 left-2 bg-flame text-white text-[10px] font-semibold px-2 py-0.5 rounded-full">Featured</span>}{dist&&<span className="absolute bottom-2 right-2 bg-black/60 text-white text-[10px] font-medium px-2 py-1 rounded-lg">{dist} km</span>}</div>
            <div className="p-3"><p className="text-flame font-bold text-sm font-grotesk">{fp(p.price)}</p><p className="text-xs font-medium mt-0.5 truncate">{p.title}</p><p className="text-[10px] text-storm mt-0.5">{p.suburb}, {p.city}</p>{specs.length>0&&<div className="flex gap-2 mt-1.5 text-[10px] text-storm">{specs.map((s,i)=><React.Fragment key={i}>{i>0&&<span>·</span>}<span>{s}</span></React.Fragment>)}</div>}</div>
        </div>);
    return(
        <div onClick={()=>tap(p)} className="flex gap-3 p-3 bg-dn-light rounded-xl cursor-pointer ch fi mb-2">
            <div className="relative flex-shrink-0"><img src={img} alt={p.title} className="w-20 h-20 rounded-lg object-cover" loading="lazy" onError={imgErr}/>{p.featured&&<span className="absolute top-1 left-1 bg-flame w-2 h-2 rounded-full"></span>}</div>
            <div className="flex-1 min-w-0"><p className="text-flame font-bold text-sm font-grotesk">{fp(p.price)}</p><p className="text-xs font-medium mt-0.5 truncate">{p.title}</p><p className="text-[10px] text-storm">{p.suburb}, {p.city}</p>{specsErf.length>0&&<div className="flex gap-2 mt-1 text-[10px] text-storm">{specsErf.map((s,i)=><React.Fragment key={i}>{i>0&&<span>·</span>}<span>{s}</span></React.Fragment>)}</div>}</div>
        </div>);
};

// ═══════════════════ SEARCH TAB ═══════════════════
const SearchTab=({properties,onSelect})=>{
    const[q,setQ]=useState('');const[pf,setPf]=useState(null);const[bf,setBf]=useState(null);const[up,setUp]=useState(false);const[st,setSt]=useState('newest');const[ld,setLd]=useState(false);
    const mapEl=useRef(null);const mapI=useRef(null);const mks=useRef([]);
    const fl=useMemo(()=>{let f=properties.filter(p=>{
        const s=q.toLowerCase();const mQ=!s||p.title.toLowerCase().includes(s)||p.suburb.toLowerCase().includes(s)||p.city.toLowerCase().includes(s);
        const mP=!pf||(pf==='<1m'&&p.price<1e6)||(pf==='1-3m'&&p.price>=1e6&&p.price<3e6)||(pf==='3-5m'&&p.price>=3e6&&p.price<5e6)||(pf==='5m+'&&p.price>=5e6);
        const mB=!bf||p.bedrooms>=bf;return mQ&&mP&&mB;
    });
    if(st==='price-asc')f=f.sort((a,b)=>a.price-b.price);
    else if(st==='price-desc')f=f.sort((a,b)=>b.price-a.price);
    else if(st==='size')f=f.sort((a,b)=>b.floor_size-a.floor_size);
    else f=f.sort((a,b)=>new Date(b.listed_date)-new Date(a.listed_date));
    return f;
    },[properties,q,pf,bf,st]);
    useEffect(()=>{setLd(true);setTimeout(()=>setLd(false),800)},[pf,bf,st,q]);
    useEffect(()=>{if(!mapEl.current||mapI.current)return;const m=L.map(mapEl.current,{zoomControl:false}).setView([USER_LOC.lat,USER_LOC.lng],12);L.control.zoom({position:'topright'}).addTo(m);L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OSM',maxZoom:19}).addTo(m);mapI.current=m;setTimeout(()=>m.invalidateSize(),200)},[]);
    useEffect(()=>{const m=mapI.current;if(!m)return;mks.current.forEach(k=>m.removeLayer(k));mks.current=[];
        fl.forEach(p=>{const k=L.marker([p.lat,p.lng],{icon:pin(p.featured?'#FF5722':'#00BFA6',p.featured?36:28)}).addTo(m);
            const img=parseJSON(p.images)[0]||'https://via.placeholder.com/400x300?text=Property';
            k.bindPopup('<div style="padding:8px;min-width:180px"><img src="'+img+'" style="width:100%;height:90px;object-fit:cover;border-radius:8px;margin-bottom:6px"/><div style="font-family:Space Grotesk;font-weight:700;color:#FF5722;font-size:14px">'+fp(p.price)+'</div><div style="font-size:11px;margin-top:2px">'+p.title+'</div><div style="font-size:10px;color:#6B7280;margin-top:2px">'+p.bedrooms+' bed · '+p.bathrooms+' bath · '+p.floor_size+'m²</div></div>',{className:'',closeButton:true});
            mks.current.push(k)})
    },[fl]);
    const C=({l,a,t})=><button onClick={t} className={'px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-all '+(a?'bg-flame text-white shadow-lg':'bg-dn-light text-storm border border-charcoal hover:border-flame')}>{l}</button>;
    const S=({l,a,t})=><button onClick={t} className={'px-2.5 py-1 rounded-full text-xs font-medium whitespace-nowrap transition-all '+(a?'bg-teal/20 text-teal border border-teal':'bg-dn-light text-storm border border-charcoal')}>{l}</button>;
    return(
        <div className="h-full flex flex-col relative">
            <div className="absolute top-0 left-0 right-0 z-[1000] p-3 pb-0" style={{background:'linear-gradient(to bottom, #1A1A2E 60%, transparent)'}}>
                <div className="flex items-center gap-2 bg-dn-light border border-charcoal rounded-xl px-3 py-2.5 shadow-lg">
                    <span className="text-storm text-sm">🔍</span>
                    <input type="text" placeholder="Search suburb, city, or area..." value={q} onChange={e=>setQ(e.target.value)} className="bg-transparent outline-none flex-1 text-sm placeholder-storm"/>
                    {q&&<button onClick={()=>setQ('')} className="text-storm text-xs">✕</button>}
                </div>
                <div className="flex gap-2 mt-2 overflow-x-auto pb-2">
                    {[['< R1M','<1m'],['R1M–R3M','1-3m'],['R3M–R5M','3-5m'],['R5M+','5m+']].map(([l,v])=><C key={v} l={l} a={pf===v} t={()=>setPf(pf===v?null:v)}/>)}
                    {[2,3,4].map(b=><C key={b} l={b+'+ Beds'} a={bf===b} t={()=>setBf(bf===b?null:b)}/>)}
                </div>
                <div className="flex gap-2 mt-1.5 overflow-x-auto pb-2">
                    {[['Newest','newest'],['Price ↑','price-asc'],['Price ↓','price-desc'],['Size','size']].map(([l,v])=><S key={v} l={l} a={st===v} t={()=>setSt(v)}/>)}
                </div>
            </div>
            <div ref={mapEl} className="flex-1" style={{minHeight:'100%'}}></div>
            <button onClick={()=>{const m=mapI.current;if(m)m.setView([USER_LOC.lat,USER_LOC.lng],13)}} className="absolute bottom-52 right-4 z-[1001] w-10 h-10 rounded-full bg-teal text-deep-night flex items-center justify-center text-lg hover:bg-teal/90 transition shadow-lg">📍</button>
            <div className={'absolute bottom-0 left-0 right-0 bg-deep-night border-t border-charcoal rounded-t-2xl z-[1000] transition-all duration-300 '+(up?'h-[70%]':'h-[38%]')} style={{boxShadow:'0 -8px 32px rgba(0,0,0,.4)'}}>
                <div className="dh cursor-pointer" onClick={()=>setUp(!up)}></div>
                <div className="px-4 pb-1 flex justify-between items-center"><p className="text-xs text-storm">{fl.length} properties{(pf||bf)&&<button onClick={()=>{setPf(null);setBf(null);setSt('newest')}} className="ml-3 text-xs text-flame">Clear all</button>}</p><button onClick={()=>setUp(!up)} className="text-xs text-flame">{up?'Collapse':'View all'}</button></div>
                <div className="px-4 pb-24 overflow-y-auto" style={{maxHeight:'calc(100% - 50px)'}}>
                    {ld&&<>{[0,1,2].map(i=><div key={i} className="shimmer h-20 rounded-xl mb-2"/>)}</>}
                    {!ld&&fl.map(p=><Card key={p.id} p={p} tap={onSelect}/>)}
                </div>
            </div>
        </div>);
};

// ═══════════════════ LISTING DETAIL ═══════════════════
const Detail=({p,close,properties})=>{
    const[ii,setI]=useState(0);const[sv,setSv]=useState(false);const[sd,setSd]=useState(false);const[fg,setFg]=useState(false);const a=p.agent||{};
    const mp=calcMonthlyPayment(p.price,10,11.75,240);
    const imgs=parseJSON(p.images);
    const sim=properties.filter(x=>x.city===p.city&&x.id!==p.id&&Math.abs(x.price-p.price)<=p.price*0.3).slice(0,3);
    useEffect(()=>{api.post('/properties/'+p.id+'/view',{}).catch(()=>{})},[] );
    const toggleSave=async()=>{try{if(sv){await api.del('/users/saved/'+p.id)}else{await api.post('/users/saved/'+p.id,{})}setSv(!sv)}catch{}};
    return(
        <div className="fixed inset-0 z-[2000] bg-deep-night overflow-y-auto su">
            {fg&&<div className="fixed inset-0 z-[2001] bg-black flex items-center justify-center" onClick={()=>setFg(false)}><img src={imgs[ii]||FALLBACK_IMG} alt="" className="max-h-screen max-w-full object-contain" onError={imgErr}/></div>}
            <div className="relative h-72">
                <img src={imgs[ii]||FALLBACK_IMG} alt={p.title} className="w-full h-full object-cover cursor-pointer" onClick={()=>setFg(true)} onError={imgErr}/>
                <div className="absolute inset-0" style={{background:'linear-gradient(transparent 40%, #1A1A2E)'}}></div>

    return(
        <div className="h-full overflow-y-auto bg-deep-night p-4 pb-24">
            <div className="flex items-center gap-4 mb-6"><div className="w-16 h-16 rounded-full bg-flame/20 flex items-center justify-center text-2xl border-2 border-flame">👤</div><div><h1 className="font-grotesk text-2xl font-bold">{user?.name||'User'}</h1><p className="text-sm text-storm">{user?.email}</p></div></div>
            <div className="grid grid-cols-3 gap-3 mb-6">
                <div className="bg-dn-light rounded-xl p-3 text-center"><p className="text-xs text-storm">Viewed</p><p className="text-lg font-bold text-flame mt-1">{stats.propertiesViewed||'—'}</p></div>
                <div className="bg-dn-light rounded-xl p-3 text-center"><p className="text-xs text-storm">Contacted</p><p className="text-lg font-bold text-teal mt-1">{stats.agentsContacted||'—'}</p></div>
                <div onClick={()=>setShowSaved(!showSaved)} className="bg-dn-light rounded-xl p-3 text-center cursor-pointer hover:bg-charcoal/50 transition"><p className="text-xs text-storm">Saved</p><p className="text-lg font-bold text-green mt-1">{saved.length||'—'}</p></div>
            </div>
            {showSaved&&<div className="mb-6">
                <h3 className="font-semibold text-sm mb-3">Saved Properties</h3>
                {saved.length===0&&<div className="bg-dn-light rounded-xl p-6 text-center"><p className="text-sm text-storm">No saved properties yet. Tap ❤️ on any listing to save it.</p></div>}
                {saved.map(p=><div key={p.id} className="flex gap-3 p-3 bg-dn-light rounded-xl mb-2"><div className="flex-shrink-0"><img src={parseJSON(p.images)[0]||FALLBACK_IMG} alt={p.title} className="w-16 h-16 rounded-lg object-cover" onError={imgErr}/></div><div className="flex-1 min-w-0"><p className="text-flame font-bold text-sm">{fp(p.price)}</p><p className="text-xs font-medium truncate">{p.title}</p><p className="text-[10px] text-storm">{p.suburb}, {p.city}</p></div></div>)}
            </div>}
            <h3 className="font-semibold text-sm mb-3">Mortgage Calculator</h3>
            <div className="bg-dn-light rounded-xl p-4 mb-6">
                <div className="mb-4"><p className="text-xs text-storm mb-2">Property Price</p><input type="range" min="500000" max="20000000" step="100000" value={pp} onChange={e=>setPp(Number(e.target.value))} className="w-full"/><p className="text-sm font-bold text-flame mt-2">{fp(pp)}</p></div>
                <div className="mb-4"><p className="text-xs text-storm mb-2">Deposit: {dp}%</p><input type="range" min="5" max="50" value={dp} onChange={e=>setDp(Number(e.target.value))} className="w-full"/></div>
                <div className="p-3 bg-deep-night rounded-lg mb-3"><div className="flex justify-between text-xs text-storm mb-2"><span>Monthly Payment</span><span className="text-flame font-bold text-sm">{fp(mp)}</span></div><div className="flex justify-between text-xs text-storm mb-2"><span>Total Interest</span><span className="text-amber">{fp(ti)}</span></div><div className="flex justify-between text-xs text-storm"><span>Total Cost</span><span className="text-green">{fp(tc)}</span></div></div>
                <div className="p-3 bg-deep-night rounded-lg"><p className="text-[10px] text-storm mb-2">Acquisition Costs</p><div className="flex justify-between text-xs mb-1"><span>Transfer Duty</span><span>{fp(td)}</span></div><div className="flex justify-between text-xs"><span>Agent Fee</span><span>{fp(af)}</span></div></div>
            </div>
            <button onClick={()=>{clearToken();onLogout()}} className="w-full bg-red/20 border border-red/30 text-red font-semibold py-3 rounded-xl hover:bg-red/30 transition">Sign Out</button>
        </div>);
};

// ═══════════════════ MAIN APP ═══════════════════
const App=()=>{
    const[user,setUser]=useState(null);const[properties,setProperties]=useState([]);const[chats,setChats]=useState([]);const[loading,setLoading]=useState(true);const[tab,setTab]=useState('search');const[sel,setSel]=useState(null);const[splash,setSplash]=useState(true);const[onb,setOnb]=useState(!localStorage.getItem('khaya_onb_done'));
    useEffect(()=>{const token=getToken();if(token){api.get('/auth/me').then(data=>{if(data.user){setUser(data.user);loadData()}else{clearToken();setLoading(false)}}).catch(()=>{clearToken();setLoading(false)})}else{setLoading(false)}},[] );
    const loadData=async()=>{try{const[propsRes,chatsRes]=await Promise.all([api.get('/properties?limit=200'),api.get('/chats').catch(()=>({data:[]}))]);setProperties((propsRes.data||[]).map(p=>({...p,features:parseJSON(p.features),images:parseJSON(p.images)})));setChats((chatsRes.data||[]).map(c=>({id:c.id,agent_name:c.agent_name,property_title:c.property_title,last_message:c.lastMessage?c.lastMessage.message:'',last_message_time:c.lastMessage?c.lastMessage.created_at:c.created_at,unread:c.unreadCount||0})));setLoading(false)}catch(e){console.error('loadData error:',e);setLoading(false)}};
    const handleLogout=()=>{setUser(null);setSel(null);setTab('search')};
    if(!loading&&!user)return<LoginScreen onLogin={(u)=>{setUser(u);loadData()}}/>;
    if(loading)return<div className="h-screen bg-deep-night flex items-center justify-center"><div className="w-8 h-8 rounded-full border-2 border-flame border-t-transparent animate-spin"></div></div>;
    if(onb)return<Onboarding done={()=>{setOnb(false);localStorage.setItem('khaya_onb_done','1')}}/>;
    if(sel)return<Detail p={sel} close={()=>setSel(null)} properties={properties}/>;
    return(
        <div className="h-screen bg-deep-night flex flex-col">
            <Toast/>
            <div className="flex-1 overflow-hidden tab-fade" key={tab}>
            {tab==='search'&&<SearchTab properties={properties} onSelect={p=>setSel(p)}/>}
            {tab==='explore'&&<ExploreTab properties={properties} onSelect={p=>setSel(p)}/>}
            {tab==='snap'&&<SnapTab properties={properties} onSelect={p=>setSel(p)}/>}
            {tab==='chats'&&<ChatsTab chats={chats}/>}
            {tab==='profile'&&<ProfileTab user={user} onLogout={handleLogout}/>}
            </div>
            <div className="flex gap-1 border-t border-charcoal bg-deep-night px-2 py-2">
                {[['search','🔍','Search'],['explore','🧭','Explore'],['snap','📸','Snap'],['chats','💬','Chats'],['profile','👤','Profile']].map(([k,ic,nm])=>(
                    <button key={k} onClick={()=>setTab(k)} className={'flex-1 flex flex-col items-center gap-1 py-2 px-1 rounded-lg transition-all '+(tab===k?'bg-flame/20':'hover:bg-dn-light')}>
                        <span className="text-lg">{ic}</span>
                        <span className="text-[10px] font-medium">{nm}</span>
                    </button>))}
            </div>
        </div>);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
